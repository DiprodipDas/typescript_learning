<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter Subscription</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #e4e3e9, #aaa9ac);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: #fff;
        width: 380px;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        text-align: center;
      }

      .card h1 {
        color: #222;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .card p {
        color: #666;
        margin-bottom: 25px;
        line-height: 1.5;
      }

      .input-group {
        margin-bottom: 20px;
      }

      input[type="email"] {
        width: 100%;
        padding: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }

      input[type="email"]:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background: #4f46e5;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #97979c;
      }

      .footer {
        margin-top: 20px;
        color: #888;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Subscribe</h1>
      <p>
        Join our newsletter
      </p>

      <form action="#" method="POST">
        <div class="input-group">
          <input
            type="email"
            id="email"
            placeholder="Enter your email address"
            required
          />
        </div>

        <button type="submit" id="send">Subscribe</button>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
