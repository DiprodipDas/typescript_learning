<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 450px;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .task-input {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
      }

      .task-input input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
      }

      .task-input button {
        padding: 12px 18px;
        border: none;
        background: #4f46e5;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
      }

      .task-input button:hover {
        background: #4338ca;
      }

      .task-list {
        list-style: none;
      }

      .task-list li {
        border-bottom: 1px solid #eee;
        padding: 12px 0;
      }

      .task-list li:last-child {
        border-bottom: none;
      }

      .task-list label {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        font-size: 17px;
        color: #333;
      }

      .task-list input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-right: 10px;
        cursor: pointer;
      }

      /* Apply strikethrough when checked */
      .task-list input[type="checkbox"]:checked + span {
        text-decoration: line-through;
        color: #888;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📝 Task Manager</h1>

      <!-- Task Input Form -->
      <section>
        <form class="task-input" id="task-form">
          <input type="text" id="task-input" placeholder="Enter a new task" />
          <button type="submit">Add Task</button>
        </form>
      </section>

      <!-- Task List Section -->
      <section class="task-section">
        <ul class="task-list" id="task-list">
          
        </ul>
        <button id="export">Export Task</button>
      </section>
    </div>
    <script src="script2.js"></script>
  </body>
</html>
